name: CI

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
  workflow_call:

jobs:
  build:
    name: Code standards & build
    runs-on: ubuntu-latest
    timeout-minutes: 6
    if: github.event_name != 'schedule'

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔍 Tooling versions"
        run: |
          node -v
          pnpm -v
          pnpm -s exec eslint -v
          pnpm -s list eslint @typescript-eslint/parser typescript

      - name: "📚 Check context layer"
        run: pnpm run check:context

      - name: "🔎 Lint code"
        run: pnpm run lint

      - name: "🧱 Check domain boundaries"
        run: pnpm run check:boundaries

      - name: "📝 Checking code format"
        run: pnpm run format:check

      - name: "🧪 Run tests"
        run: pnpm run test

      - name: "🧾 Check frontmatter contract"
        run: pnpm run check:frontmatter

      - name: "🗂️ Scan publishable articles for hero pipeline"
        run: node scripts/hero-images/scan-articles.mjs

      - name: "🧠 Build deterministic hero prompts"
        run: node scripts/hero-images/build-prompts.mjs

      - name: "🧭 Check semantic hero prompt contract"
        run: node scripts/check-hero-prompts.mjs

      - name: "🖼️ Check hero image contract"
        run: node scripts/check-hero-images.mjs

      - name: "✍️ Check editorial invariants"
        run: pnpm run check:editorial
        env:
          EDITORIAL_ENFORCE: "1"
          EDITORIAL_SCOPE: ${{ github.event_name == 'pull_request' && 'changed' || 'all' }}
          EDITORIAL_DIFF_BASE_REF: ${{ github.base_ref }}

      - name: "🚫 Guard against post.id URL regressions"
        run: pnpm run check:no-postid-urls

      - name: "🧭 Check public routes baseline"
        run: pnpm run check:routes

      - name: "🔬 Astro check"
        run: pnpm run astro check

      - name: "🚀 Build the project"
        run: pnpm run build

      - name: "🔗 URL check (CI mode)"
        id: urlcheck_ci
        run: pnpm run check:urls:ci

      - name: "📡 Check RSS baseline (no removals)"
        run: pnpm run check:rss

      - name: "🧩 Ensure URL check artifacts exist"
        if: always() && steps.urlcheck_ci.outcome == 'skipped'
        run: |
          mkdir -p scripts/urlcheck/artifacts
          [ -f scripts/urlcheck/artifacts/internal-broken.json ] || printf '[]\n' > scripts/urlcheck/artifacts/internal-broken.json
          [ -f scripts/urlcheck/artifacts/internal-broken.csv ] || printf 'broken_url,status,referrer_url,context,category\n' > scripts/urlcheck/artifacts/internal-broken.csv
          [ -f scripts/urlcheck/artifacts/urlcheck-report.json ] || printf '{"generatedAt":"%s","note":"placeholder"}\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > scripts/urlcheck/artifacts/urlcheck-report.json

      - name: "📤 Upload URL check artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urlcheck-artifacts-ci
          retention-days: 14
          if-no-files-found: error
          path: |
            scripts/urlcheck/artifacts/internal-broken.json
            scripts/urlcheck/artifacts/internal-broken.csv
            scripts/urlcheck/artifacts/urlcheck-report.json

  external-url-audit:
    name: External URL audit (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v6

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🏗️ Build static output"
        run: pnpm run astro build

      - name: "🌐 Run external URL audit (non-blocking)"
        id: urlcheck_external_audit
        run: pnpm run check:urls:external:audit

      - name: "🧩 Ensure URL check artifacts exist"
        if: always() && steps.urlcheck_external_audit.outcome == 'skipped'
        run: |
          mkdir -p scripts/urlcheck/artifacts
          [ -f scripts/urlcheck/artifacts/internal-broken.json ] || printf '[]\n' > scripts/urlcheck/artifacts/internal-broken.json
          [ -f scripts/urlcheck/artifacts/internal-broken.csv ] || printf 'broken_url,status,referrer_url,context,category\n' > scripts/urlcheck/artifacts/internal-broken.csv
          [ -f scripts/urlcheck/artifacts/urlcheck-report.json ] || printf '{"generatedAt":"%s","note":"placeholder"}\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > scripts/urlcheck/artifacts/urlcheck-report.json

      - name: "📤 Upload external audit artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urlcheck-artifacts-external-audit
          retention-days: 14
          if-no-files-found: error
          path: |
            scripts/urlcheck/artifacts/internal-broken.json
            scripts/urlcheck/artifacts/internal-broken.csv
            scripts/urlcheck/artifacts/urlcheck-report.json
