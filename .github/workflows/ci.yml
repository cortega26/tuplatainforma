name: CI

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  workflow_call:

jobs:
  build:
    name: Code standards & build
    runs-on: ubuntu-latest
    timeout-minutes: 6

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔍 Tooling versions"
        run: |
          node -v
          pnpm -v
          pnpm -s exec eslint -v
          pnpm -s list eslint @typescript-eslint/parser typescript

      - name: "📚 Check context layer"
        run: pnpm run check:context

      - name: "🔎 Lint code"
        run: pnpm run lint

      - name: "🧱 Check domain boundaries"
        run: pnpm run check:boundaries

      - name: "📝 Checking code format"
        run: pnpm run format:check

      - name: "🧪 Run tests"
        run: pnpm run test

      - name: "🧾 Check frontmatter contract"
        run: pnpm run check:frontmatter

      - name: "✍️ Check editorial invariants"
        run: pnpm run check:editorial

      - name: "🚫 Guard against post.id URL regressions"
        run: pnpm run check:no-postid-urls

      - name: "🧭 Check public routes baseline"
        run: pnpm run check:routes

      - name: "🔬 Astro check"
        run: pnpm run astro check

      - name: "🚀 Build the project"
        run: pnpm run build

      - name: "📡 Check RSS baseline (no removals)"
        run: pnpm run check:rss
