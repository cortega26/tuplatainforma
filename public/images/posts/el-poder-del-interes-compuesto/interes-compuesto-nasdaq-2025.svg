<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Simulacion corregida del interes compuesto con sueldo minimo y NASDAQ-100 entre 1990 y 2025</title>
  <desc id="desc">Grafico de dos paneles con una curva de cartera en USD y barras de aporte mensual. El resultado final mostrado es USD 129,495, equivalente a aproximadamente 125.6 millones de pesos chilenos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07152b"/>
      <stop offset="100%" stop-color="#081326"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1dde78" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#1dde78" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ad17"/>
      <stop offset="100%" stop-color="#df9300"/>
    </linearGradient>
    <style>
      .title { font: 700 28px "Inter", "Segoe UI", Arial, sans-serif; fill: #eef2f7; }
      .axis { font: 400 13px "Inter", "Segoe UI", Arial, sans-serif; fill: #7c8baa; }
      .label { font: 500 16px "Inter", "Segoe UI", Arial, sans-serif; fill: #7f8dab; }
      .small { font: 400 11px "Inter", "Segoe UI", Arial, sans-serif; fill: #69799a; }
      .event { font: 500 11px "Inter", "Segoe UI", Arial, sans-serif; fill: #f35c65; }
      .callout-big { font: 700 26px "Inter", "Segoe UI", Arial, sans-serif; fill: #eef2f7; }
      .callout-small { font: 700 18px "Inter", "Segoe UI", Arial, sans-serif; fill: #eef2f7; }
      .legend { font: 500 13px "Inter", "Segoe UI", Arial, sans-serif; fill: #d7deea; }
    </style>
  </defs>

  <rect width="1800" height="1120" fill="url(#bg)"/>

